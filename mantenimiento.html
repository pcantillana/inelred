<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración | INELRED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300 font-sans">

    <div id="toastContainer" class="fixed top-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 transition-colors sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition">
                    <i class="bi bi-arrow-left text-xl"></i>
                </a>
                <img src="img/logo.png" alt="Logo" class="h-8 w-auto bg-white rounded p-1">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider hidden md:block">Configuración de Maestros</span>
            </div>
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                <i class="bi bi-moon-fill dark:hidden"></i>
                <i class="bi bi-sun-fill hidden dark:block text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6 max-w-7xl">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                <i class="bi bi-gear-fill text-slate-400"></i> Ajustes del Sistema
            </h1>
        </div>

        <div class="flex border-b border-slate-200 dark:border-slate-800 mb-6 overflow-x-auto">
            <button id="tab-empresas" class="tab-btn px-6 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 focus:outline-none transition-colors whitespace-nowrap" onclick="switchTab('empresas', 'blue')">
                <i class="bi bi-building mr-2"></i>Empresas
            </button>
            <button id="tab-sucursales" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 focus:outline-none transition-colors whitespace-nowrap" onclick="switchTab('sucursales', 'purple')">
                <i class="bi bi-shop mr-2"></i>Sucursales
            </button>
            <button id="tab-solicitantes" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 focus:outline-none transition-colors whitespace-nowrap" onclick="switchTab('solicitantes', 'emerald')">
                <i class="bi bi-people mr-2"></i>Solicitantes
            </button>
            <button id="tab-equipos" class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 focus:outline-none transition-colors whitespace-nowrap" onclick="switchTab('equipos', 'orange')">
                <i class="bi bi-tools mr-2"></i>Equipos
            </button>
        </div>

        <div id="seccion-empresas" class="tab-section grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                    <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 flex items-center gap-2">
                        <i class="bi bi-building text-blue-500"></i> <span id="titulo-form-empresa">Nueva Empresa</span>
                    </h2>
                    <form id="formEmpresa" class="space-y-4">
                        <input type="hidden" id="empId">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Nombre de la Empresa</label>
                            <input type="text" id="empNombre" placeholder="Ej: TechCorp S.A." class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" id="btnCancelEmpresa" class="hidden flex-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 rounded-lg font-bold hover:bg-slate-300 dark:hover:bg-slate-600 transition" onclick="resetForm('Empresa', 'blue')">Cancelar</button>
                            <button type="submit" id="btnGuardarEmpresa" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 dark:bg-slate-800 text-xs uppercase text-slate-500 dark:text-slate-400">
                                <tr><th class="p-4">Nombre de Empresa</th><th class="p-4 text-right">Acciones</th></tr>
                            </thead>
                            <tbody id="listaEmpresas" class="divide-y divide-slate-100 dark:divide-slate-800 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="seccion-sucursales" class="tab-section grid grid-cols-1 lg:grid-cols-3 gap-6 hidden">
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                    <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 flex items-center gap-2">
                        <i class="bi bi-shop text-purple-500"></i> <span id="titulo-form-sucursal">Nueva Sucursal</span>
                    </h2>
                    <form id="formSucursal" class="space-y-4">
                        <input type="hidden" id="sucId">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Empresa</label>
                            <select id="sucEmpresaId" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition" required></select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Nombre de Sucursal</label>
                            <input type="text" id="sucNombre" placeholder="Ej: Planta Norte" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition" required>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" id="btnCancelSucursal" class="hidden flex-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 rounded-lg font-bold hover:bg-slate-300 dark:hover:bg-slate-600 transition" onclick="resetForm('Sucursal', 'purple')">Cancelar</button>
                            <button type="submit" id="btnGuardarSucursal" class="flex-1 bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 transition flex items-center justify-center gap-2">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 dark:bg-slate-800 text-xs uppercase text-slate-500 dark:text-slate-400">
                                <tr><th class="p-4">Sucursal</th><th class="p-4">Empresa</th><th class="p-4 text-right">Acciones</th></tr>
                            </thead>
                            <tbody id="listaSucursales" class="divide-y divide-slate-100 dark:divide-slate-800 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="seccion-solicitantes" class="tab-section grid grid-cols-1 lg:grid-cols-3 gap-6 hidden">
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                    <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 flex items-center gap-2">
                        <i class="bi bi-person-plus text-emerald-500"></i> <span id="titulo-form-solicitante">Nuevo Solicitante</span>
                    </h2>
                    <form id="formSolicitante" class="space-y-4">
                        <input type="hidden" id="solId">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Empresa</label>
                            <select id="solEmpresaId" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required></select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Nombre</label>
                                <input type="text" id="solNombre" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Apellido</label>
                                <input type="text" id="solApellido" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Correo</label>
                            <input type="email" id="solCorreo" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" id="btnCancelSolicitante" class="hidden flex-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 rounded-lg font-bold hover:bg-slate-300 dark:hover:bg-slate-600 transition" onclick="resetForm('Solicitante', 'emerald')">Cancelar</button>
                            <button type="submit" id="btnGuardarSolicitante" class="flex-1 bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition flex items-center justify-center gap-2">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 dark:bg-slate-800 text-xs uppercase text-slate-500 dark:text-slate-400">
                                <tr><th class="p-4">Nombre Completo</th><th class="p-4">Correo</th><th class="p-4">Empresa</th><th class="p-4 text-right">Acciones</th></tr>
                            </thead>
                            <tbody id="listaSolicitantes" class="divide-y divide-slate-100 dark:divide-slate-800 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="seccion-equipos" class="tab-section grid grid-cols-1 lg:grid-cols-3 gap-6 hidden">
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                    <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 flex items-center gap-2">
                        <i class="bi bi-tools text-orange-500"></i> <span id="titulo-form-equipo">Nuevo Equipo</span>
                    </h2>
                    <form id="formEquipo" class="space-y-4">
                        <input type="hidden" id="eqId">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Nombre del Equipo</label>
                            <input type="text" id="eqNombre" placeholder="Ej: Motor Eléctrico" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Marca</label>
                            <input type="text" id="eqMarca" placeholder="Ej: Siemens" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">N° Serie / Modelo</label>
                            <input type="text" id="eqSerie" placeholder="Ej: SM-2023-991" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none transition" required>
                        </div>
                        <div class="flex gap-2">
                            <button type="button" id="btnCancelEquipo" class="hidden flex-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 rounded-lg font-bold hover:bg-slate-300 dark:hover:bg-slate-600 transition" onclick="resetForm('Equipo', 'orange')">Cancelar</button>
                            <button type="submit" id="btnGuardarEquipo" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-bold hover:bg-orange-700 transition flex items-center justify-center gap-2">
                                <i class="bi bi-save"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 dark:bg-slate-800 text-xs uppercase text-slate-500 dark:text-slate-400">
                                <tr><th class="p-4">Equipo</th><th class="p-4">Marca</th><th class="p-4">Serie</th><th class="p-4 text-right">Acciones</th></tr>
                            </thead>
                            <tbody id="listaEquipos" class="divide-y divide-slate-100 dark:divide-slate-800 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMcHFfBlG76ua3fVTOdpyXNXqXTooELf8",
            authDomain: "inelred-e8f50.firebaseapp.com",
            projectId: "inelred-e8f50",
            storageBucket: "inelred-e8f50.firebasestorage.app",
            messagingSenderId: "412934833273",
            appId: "1:412934833273:web:734337299e2557ed8f40a8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let empresasMap = {}; // Caché para nombres de empresas

        // --- Utilidades UI ---
        document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));

        window.mostrarToast = (mensaje, tipo = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bg = tipo === 'success' ? 'bg-emerald-600' : 'bg-red-600';
            const icon = tipo === 'success' ? 'bi-check-circle' : 'bi-exclamation-triangle';
            toast.className = `${bg} text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `<i class="bi ${icon} text-lg"></i> <span class="font-medium">${mensaje}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0'));
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        window.switchTab = (tab, colorCls) => {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.className = "tab-btn px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 focus:outline-none transition-colors whitespace-nowrap";
            });
            document.querySelectorAll('.tab-section').forEach(s => s.classList.add('hidden'));
            
            const btn = document.getElementById(`tab-${tab}`);
            btn.className = `tab-btn px-6 py-3 text-sm font-bold border-b-2 border-${colorCls}-600 text-${colorCls}-600 dark:text-${colorCls}-400 focus:outline-none transition-colors whitespace-nowrap`;
            document.getElementById(`seccion-${tab}`).classList.remove('hidden');
        };

        window.resetForm = (tipo, color) => {
            document.getElementById(`form${tipo}`).reset();
            document.getElementById(`${tipo.toLowerCase() === 'equipo' ? 'eq' : tipo.substring(0,3).toLowerCase()}Id`).value = '';
            document.getElementById(`titulo-form-${tipo.toLowerCase()}`).innerText = `Nuevo ${tipo}`;
            document.getElementById(`btnGuardar${tipo}`).innerHTML = '<i class="bi bi-save"></i> Guardar';
            document.getElementById(`btnCancel${tipo}`).classList.add('hidden');
        };

        function setEditMode(tipo, id, datos, color) {
            document.getElementById(`${tipo.toLowerCase() === 'equipo' ? 'eq' : tipo.substring(0,3).toLowerCase()}Id`).value = id;
            document.getElementById(`titulo-form-${tipo.toLowerCase()}`).innerText = `Editar ${tipo}`;
            document.getElementById(`btnGuardar${tipo}`).innerHTML = '<i class="bi bi-pencil-square"></i> Actualizar';
            document.getElementById(`btnCancel${tipo}`).classList.remove('hidden');
            
            // Rellenar datos
            for (const [key, value] of Object.entries(datos)) {
                const el = document.getElementById(key);
                if(el) el.value = value;
            }
        }

        // --- Carga de Datos ---
        onAuthStateChanged(auth, (user) => { 
            if (!user) window.location.href = 'index.html'; 
            else cargarTodosLosDatos(); 
        });

        async function cargarTodosLosDatos() {
            await cargarEmpresas();
            await cargarSucursales();
            await cargarSolicitantes();
            await cargarEquipos();
        }

        // --- EMPRESAS ---
        async function cargarEmpresas() {
            const snap = await getDocs(collection(db, "empresas"));
            const lista = document.getElementById('listaEmpresas');
            const selectSuc = document.getElementById('sucEmpresaId');
            const selectSol = document.getElementById('solEmpresaId');
            
            lista.innerHTML = '';
            selectSuc.innerHTML = '<option value="">Seleccione Empresa</option>';
            selectSol.innerHTML = '<option value="">Seleccione Empresa</option>';
            empresasMap = {};

            snap.forEach(d => {
                const data = d.data();
                empresasMap[d.id] = data.nombre;
                
                // Llenar tabla
                lista.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                        <td class="p-4 font-bold text-slate-700 dark:text-slate-200">${data.nombre}</td>
                        <td class="p-4 text-right">
                            <button onclick="editarEmpresaUI('${d.id}', '${data.nombre}')" class="text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 p-2 rounded transition"><i class="bi bi-pencil"></i></button>
                            <button onclick="eliminarRegistro('empresas','${d.id}')" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded transition"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
                
                // Llenar selects
                const opt = `<option value="${d.id}">${data.nombre}</option>`;
                selectSuc.innerHTML += opt;
                selectSol.innerHTML += opt;
            });
        }

        window.editarEmpresaUI = (id, nombre) => {
            setEditMode('Empresa', id, { empNombre: nombre }, 'blue');
            switchTab('empresas', 'blue');
        };

        document.getElementById('formEmpresa').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('empId').value;
            const nom = document.getElementById('empNombre').value.trim();
            try {
                if(id) {
                    await updateDoc(doc(db, "empresas", id), { nombre: nom });
                    mostrarToast("Empresa actualizada");
                } else {
                    await addDoc(collection(db, "empresas"), { nombre: nom });
                    mostrarToast("Empresa creada");
                }
                resetForm('Empresa', 'blue');
                cargarTodosLosDatos(); // Recargar todo porque el nombre pudo cambiar
            } catch(e) { mostrarToast(e.message, 'error'); }
        });

        // --- SUCURSALES ---
        async function cargarSucursales() {
            const snap = await getDocs(collection(db, "sucursales"));
            const lista = document.getElementById('listaSucursales');
            lista.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                lista.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                        <td class="p-4 font-bold text-slate-700 dark:text-slate-200">${data.nombre}</td>
                        <td class="p-4 text-slate-500"><span class="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded text-xs">${empresasMap[data.empresa_id] || 'Desconocida'}</span></td>
                        <td class="p-4 text-right">
                            <button onclick="editarSucursalUI('${d.id}', '${data.empresa_id}', '${data.nombre}')" class="text-purple-500 hover:bg-purple-50 dark:hover:bg-purple-900/30 p-2 rounded transition"><i class="bi bi-pencil"></i></button>
                            <button onclick="eliminarRegistro('sucursales','${d.id}')" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded transition"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        window.editarSucursalUI = (id, empId, nombre) => {
            setEditMode('Sucursal', id, { sucEmpresaId: empId, sucNombre: nombre }, 'purple');
            switchTab('sucursales', 'purple');
        };

        document.getElementById('formSucursal').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('sucId').value;
            const empId = document.getElementById('sucEmpresaId').value;
            const nom = document.getElementById('sucNombre').value.trim();
            try {
                if(id) {
                    await updateDoc(doc(db, "sucursales", id), { empresa_id: empId, nombre: nom });
                    mostrarToast("Sucursal actualizada");
                } else {
                    await addDoc(collection(db, "sucursales"), { empresa_id: empId, nombre: nom });
                    mostrarToast("Sucursal creada");
                }
                resetForm('Sucursal', 'purple');
                cargarSucursales();
            } catch(e) { mostrarToast(e.message, 'error'); }
        });

        // --- SOLICITANTES ---
        async function cargarSolicitantes() {
            const snap = await getDocs(collection(db, "solicitantes"));
            const lista = document.getElementById('listaSolicitantes');
            lista.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                lista.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                        <td class="p-4 font-bold text-slate-700 dark:text-slate-200">${data.nombre} ${data.apellido}</td>
                        <td class="p-4 text-slate-500">${data.correo}</td>
                        <td class="p-4"><span class="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded text-xs text-slate-500">${empresasMap[data.empresa_id] || 'Desconocida'}</span></td>
                        <td class="p-4 text-right">
                            <button onclick="editarSolicitanteUI('${d.id}', '${data.empresa_id}', '${data.nombre}', '${data.apellido}', '${data.correo}')" class="text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 p-2 rounded transition"><i class="bi bi-pencil"></i></button>
                            <button onclick="eliminarRegistro('solicitantes','${d.id}')" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded transition"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        window.editarSolicitanteUI = (id, empId, nombre, apellido, correo) => {
            setEditMode('Solicitante', id, { solEmpresaId: empId, solNombre: nombre, solApellido: apellido, solCorreo: correo }, 'emerald');
            switchTab('solicitantes', 'emerald');
        };

        document.getElementById('formSolicitante').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('solId').value;
            const data = {
                empresa_id: document.getElementById('solEmpresaId').value,
                nombre: document.getElementById('solNombre').value.trim(),
                apellido: document.getElementById('solApellido').value.trim(),
                correo: document.getElementById('solCorreo').value.trim()
            };
            try {
                if(id) {
                    await updateDoc(doc(db, "solicitantes", id), data);
                    mostrarToast("Solicitante actualizado");
                } else {
                    await addDoc(collection(db, "solicitantes"), data);
                    mostrarToast("Solicitante creado");
                }
                resetForm('Solicitante', 'emerald');
                cargarSolicitantes();
            } catch(e) { mostrarToast(e.message, 'error'); }
        });

        // --- EQUIPOS ---
        async function cargarEquipos() {
            const snap = await getDocs(collection(db, "equipos"));
            const lista = document.getElementById('listaEquipos');
            lista.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                lista.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                        <td class="p-4 font-bold text-slate-700 dark:text-slate-200">${data.nombre}</td>
                        <td class="p-4 text-slate-500">${data.marca}</td>
                        <td class="p-4 font-mono text-xs text-slate-400">${data.serie}</td>
                        <td class="p-4 text-right">
                            <button onclick="editarEquipoUI('${d.id}', '${data.nombre}', '${data.marca}', '${data.serie}')" class="text-orange-500 hover:bg-orange-50 dark:hover:bg-orange-900/30 p-2 rounded transition"><i class="bi bi-pencil"></i></button>
                            <button onclick="eliminarRegistro('equipos','${d.id}')" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded transition"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        window.editarEquipoUI = (id, nombre, marca, serie) => {
            setEditMode('Equipo', id, { eqNombre: nombre, eqMarca: marca, eqSerie: serie }, 'orange');
            switchTab('equipos', 'orange');
        };

        document.getElementById('formEquipo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('eqId').value;
            const data = {
                nombre: document.getElementById('eqNombre').value.trim(),
                marca: document.getElementById('eqMarca').value.trim(),
                serie: document.getElementById('eqSerie').value.trim()
            };
            try {
                if(id) {
                    await updateDoc(doc(db, "equipos", id), data);
                    mostrarToast("Equipo actualizado");
                } else {
                    await addDoc(collection(db, "equipos"), data);
                    mostrarToast("Equipo registrado");
                }
                resetForm('Equipo', 'orange');
                cargarEquipos();
            } catch(e) { mostrarToast(e.message, 'error'); }
        });

        // --- GLOBAL DELETE ---
        window.eliminarRegistro = async (col, id) => {
            if(confirm('¿Eliminar este registro permanentemente?')) {
                try {
                    await deleteDoc(doc(db, col, id));
                    mostrarToast("Registro eliminado", "success");
                    if(col === 'empresas') cargarTodosLosDatos();
                    if(col === 'sucursales') cargarSucursales();
                    if(col === 'solicitantes') cargarSolicitantes();
                    if(col === 'equipos') cargarEquipos();
                } catch(error) {
                    mostrarToast(error.message, "error");
                }
            }
        };
    </script>
</body>
</html>
