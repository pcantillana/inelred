<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mejora Instalación | INELRED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .dropzone.dragover { background-color: #eff6ff; border-color: #3b82f6; }
        .dark .dropzone.dragover { background-color: #1e3a8a; border-color: #60a5fa; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300 font-sans">

    <div id="toastContainer" class="fixed top-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 transition-colors sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition">
                    <i class="bi bi-arrow-left text-xl"></i>
                </a>
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">Ficha de Mejora de Instalación</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs text-slate-400 font-mono hidden md:inline-block">ID: <span id="display_numero_ficha">...</span></span>
                <button id="themeToggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    <i class="bi bi-moon-fill dark:hidden"></i>
                    <i class="bi bi-sun-fill hidden dark:block text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6 max-w-5xl">
        <form id="mejoraForm" class="space-y-6">
            
            <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2"><i class="bi bi-info-square text-blue-500 mr-2"></i>Información General</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Fecha Ejecución</label>
                        <input type="date" id="fecha_ejecucion" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Empresa</label>
                        <select id="empresa_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Solicitante</label>
                        <select id="solicitante_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" disabled></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Sucursal</label>
                        <select id="sucursal_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" disabled></select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Área de Trabajo</label>
                        <input type="text" id="area_trabajo" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Ej: Subestación, Piso 2, Bodega norte..." required>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2"><i class="bi bi-wrench-adjustable text-green-500 mr-2"></i>Tipo de Mejora</h2>
                <select id="tipo_mejora" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition mb-4" required>
                    <option value="">Seleccionar tipo de mejora</option>
                    <option value="cambio_tablero">Cambio de tablero eléctrico</option>
                    <option value="ampliacion_circuitos">Ampliación de circuitos</option>
                    <option value="puntos_nuevos">Instalación de puntos nuevos</option>
                    <option value="otro">Otro (especificar)</option>
                </select>
                <input type="text" id="tipo_mejora_otro" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hidden" placeholder="Describa el tipo de mejora...">

                <!-- Dinámicos -->
                <div id="seccion_cambio_tablero" class="hidden mt-4 p-4 border border-slate-100 dark:border-slate-800 rounded-lg bg-slate-50 dark:bg-slate-800/50">
                    <h3 class="font-bold mb-3 text-sm text-slate-500 uppercase">Datos del Tablero</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="tablero_ubicacion" placeholder="Ubicación" class="p-2 border border-slate-200 dark:border-slate-700 rounded bg-white dark:bg-slate-800">
                        <input type="text" id="tablero_serie" placeholder="N° Serie" class="p-2 border border-slate-200 dark:border-slate-700 rounded bg-white dark:bg-slate-800">
                    </div>
                </div>

                <div id="seccion_ampliacion_circuitos" class="hidden mt-4 p-4 border border-slate-100 dark:border-slate-800 rounded-lg bg-slate-50 dark:bg-slate-800/50">
                    <h3 class="font-bold mb-3 text-sm text-slate-500 uppercase">Nuevos Circuitos</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="circ_cantidad" placeholder="Cantidad" class="p-2 border border-slate-200 dark:border-slate-700 rounded bg-white dark:bg-slate-800">
                        <input type="number" id="circ_tension" placeholder="Tensión (V)" class="p-2 border border-slate-200 dark:border-slate-700 rounded bg-white dark:bg-slate-800">
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2"><i class="bi bi-camera text-purple-500 mr-2"></i>Registro Fotográfico</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <div class="text-sm font-bold text-center mb-2">ANTES</div>
                        <div id="dzAntes" class="dropzone border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-4 text-center cursor-pointer">
                            <i class="bi bi-cloud-arrow-up text-2xl text-slate-400"></i>
                            <input type="file" id="fAntes" multiple accept="image/*" class="hidden">
                        </div>
                        <div id="lAntes" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-center mb-2">DURANTE</div>
                        <div id="dzDurante" class="dropzone border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-4 text-center cursor-pointer">
                            <i class="bi bi-tools text-2xl text-slate-400"></i>
                            <input type="file" id="fDurante" multiple accept="image/*" class="hidden">
                        </div>
                        <div id="lDurante" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-center mb-2">DESPUÉS</div>
                        <div id="dzDespues" class="dropzone border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-4 text-center cursor-pointer">
                            <i class="bi bi-check-circle text-2xl text-slate-400"></i>
                            <input type="file" id="fDespues" multiple accept="image/*" class="hidden">
                        </div>
                        <div id="lDespues" class="flex flex-wrap gap-2 mt-2"></div>
                    </div>
                </div>

                <h2 class="text-lg font-bold mt-8 mb-4 border-b border-slate-100 dark:border-slate-800 pb-2"><i class="bi bi-shield-check text-blue-500 mr-2"></i>Seguridad y Firmas</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <label class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg cursor-pointer">
                        <input type="checkbox" id="loto" class="w-4 h-4 text-blue-600 rounded border-slate-300">
                        <span class="font-medium text-sm">Se aplicó LOTO (Bloqueo/Etiquetado)</span>
                    </label>
                    <input type="text" id="realizado_por" placeholder="Firma: Realizado por..." class="p-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 w-full" required>
                </div>
                
                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Detalle Técnico de la Mejora</label>
                <textarea id="descripcion" rows="4" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required></textarea>
            </div>

            <button type="submit" id="btnGuardar" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-lg shadow-green-500/30">
                <i class="bi bi-check2-all"></i> Registrar Mejora
            </button>
        </form>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyBMcHFfBlG76ua3fVTOdpyXNXqXTooELf8", authDomain: "inelred-e8f50.firebaseapp.com", projectId: "inelred-e8f50", storageBucket: "inelred-e8f50.firebasestorage.app", messagingSenderId: "412934833273", appId: "1:412934833273:web:734337299e2557ed8f40a8" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let nFicha = "MRA.INST-" + new Date().toISOString().slice(0,10).replace(/-/g,'') + "-" + Math.floor(Math.random() * 9000 + 1000);
        document.getElementById('display_numero_ficha').textContent = nFicha;
        document.getElementById('fecha_ejecucion').valueAsDate = new Date();

        const initTheme = () => { if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); };
        initTheme();
        document.getElementById('themeToggle').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; });
        window.mostrarToast = (m, t='success') => { const c = document.getElementById('toastContainer'); const a = document.createElement('div'); a.className = `${t==='success'?'bg-emerald-600':'bg-red-600'} text-white px-6 py-3 rounded-lg shadow flex items-center gap-3`; a.innerHTML = `<span>${m}</span>`; c.appendChild(a); setTimeout(() => a.remove(), 3000); };

        onAuthStateChanged(auth, async (user) => { if(!user) window.location.href='index.html'; else {
            const snap = await getDocs(collection(db, "empresas"));
            const s = document.getElementById('empresa_id'); s.innerHTML = '<option value="">Seleccionar empresa</option>';
            snap.forEach(d => s.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`);
        }});

        document.getElementById('empresa_id').addEventListener('change', async (e) => {
            const id = e.target.value; const selSol = document.getElementById('solicitante_id'); const selSuc = document.getElementById('sucursal_id');
            if(!id){ selSol.disabled=true; selSuc.disabled=true; return; }
            selSol.disabled=false; selSuc.disabled=false;
            const q1 = query(collection(db, "solicitantes"), where("empresas", "array-contains", id));
            const q2 = query(collection(db, "sucursales"), where("empresa_id", "==", id));
            const [snapSol, snapSuc] = await Promise.all([getDocs(q1), getDocs(q2)]);
            selSol.innerHTML = '<option value="">Seleccionar</option>'; snapSol.forEach(d => selSol.innerHTML+=`<option value="${d.id}">${d.data().nombre}</option>`);
            selSuc.innerHTML = '<option value="">Seleccionar</option>'; snapSuc.forEach(d => selSuc.innerHTML+=`<option value="${d.id}">${d.data().alias}</option>`);
        });

        document.getElementById('tipo_mejora').addEventListener('change', (e) => {
            const v = e.target.value;
            ['cambio_tablero', 'ampliacion_circuitos'].forEach(id => document.getElementById('seccion_'+id).classList.add('hidden'));
            document.getElementById('tipo_mejora_otro').classList.add('hidden');
            if(v==='otro') document.getElementById('tipo_mejora_otro').classList.remove('hidden');
            else if(v && document.getElementById('seccion_'+v)) document.getElementById('seccion_'+v).classList.remove('hidden');
        });

        // Utils Dropzone
        const setupDz = (dzId, fId, lId) => {
            const dz = document.getElementById(dzId); const fi = document.getElementById(fId); const fl = document.getElementById(lId);
            dz.onclick = () => fi.click(); dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('dragover'); }; dz.ondragleave = () => dz.classList.remove('dragover');
            dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove('dragover'); fi.files = e.dataTransfer.files; showFiles(fi, fl); };
            fi.onchange = () => showFiles(fi, fl);
        };
        const showFiles = (i, l) => { l.innerHTML = ''; Array.from(i.files).forEach(f => { if(!f.type.startsWith('image/')) return; const r = new FileReader(); r.onload = e => { const img = document.createElement('img'); img.src = e.target.result; img.className = 'w-16 h-16 object-cover rounded shadow'; l.appendChild(img); }; r.readAsDataURL(f); }); };
        setupDz('dzAntes', 'fAntes', 'lAntes'); setupDz('dzDurante', 'fDurante', 'lDurante'); setupDz('dzDespues', 'fDespues', 'lDespues');

        async function subirMultiples(files, folder) {
            const urls = [];
            for(let i=0; i<files.length; i++) {
                const r = ref(storage, `mejoras/${nFicha}/${folder}_${i}`);
                await uploadBytes(r, files[i]); urls.push(await getDownloadURL(r));
            } return urls;
        }

        document.getElementById('mejoraForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnGuardar'); btn.disabled=true; btn.innerHTML='Subiendo...';
            try {
                const [antes, durante, despues] = await Promise.all([
                    subirMultiples(document.getElementById('fAntes').files, 'antes'),
                    subirMultiples(document.getElementById('fDurante').files, 'durante'),
                    subirMultiples(document.getElementById('fDespues').files, 'despues')
                ]);
                const data = {
                    ficha: nFicha, fecha: document.getElementById('fecha_ejecucion').value,
                    empresa: document.getElementById('empresa_id').value, suc: document.getElementById('sucursal_id').value, sol: document.getElementById('solicitante_id').value,
                    area: document.getElementById('area_trabajo').value, tipo: document.getElementById('tipo_mejora').value,
                    desc: document.getElementById('descripcion').value, loto: document.getElementById('loto').checked,
                    firma: document.getElementById('realizado_por').value,
                    fotos: { antes, durante, despues }, timestamp: serverTimestamp()
                };
                await addDoc(collection(db, "fichas_mejoras"), data);
                mostrarToast("Mejora registrada exitosamente"); setTimeout(()=>window.location.href="dashboard.html",1500);
            } catch(e) { mostrarToast("Error: " + e.message, "error"); btn.disabled=false; btn.innerHTML='Registrar Mejora'; }
        });
    </script>
</body>
</html>
