--- mejoras.html (原始)


+++ mejoras.html (修改后)
<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Ficha de Mejoras | INELRED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300 font-sans">

    <!-- Navegación -->
    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 transition-colors">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition">
                    <i class="bi bi-arrow-left text-xl"></i>
                </a>
                <img src="img/logo.png" alt="Logo" class="h-8 w-auto bg-white rounded p-1">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider hidden md:block">Nueva Ficha de Mejoras</span>
            </div>
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                <i class="bi bi-moon-fill dark:hidden"></i>
                <i class="bi bi-sun-fill hidden dark:block text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-6 mt-4">
        <div class="max-w-5xl mx-auto bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                    <i class="bi bi-wrench-adjustable text-green-600"></i> Formulario de Mejoras
                </h1>
            </div>

            <form id="mejorasForm" class="space-y-6">
                <!-- Datos básicos -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Empresa</label>
                        <select id="empresa_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" required>
                            <option value="">Cargando empresas...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Solicitante</label>
                        <select id="solicitante_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" required disabled>
                            <option value="">Selecciona una empresa primero</option>
                        </select>
                    </div>
                </div>

                <!-- Tipo de mejora -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Tipo de Mejora</label>
                        <select id="tipo_mejora" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" required>
                            <option value="">Seleccionar tipo</option>
                            <option value="infraestructura">Infraestructura</option>
                            <option value="equipamiento">Equipamiento</option>
                            <option value="seguridad">Seguridad</option>
                            <option value="eficiencia">Eficiencia Energética</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Prioridad</label>
                        <select id="prioridad" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" required>
                            <option value="">Seleccionar prioridad</option>
                            <option value="baja">Baja</option>
                            <option value="media">Media</option>
                            <option value="alta">Alta</option>
                            <option value="critica">Crítica</option>
                        </select>
                    </div>
                </div>

                <!-- Descripción -->
                <div>
                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Descripción de la Mejora</label>
                    <textarea id="descripcion" rows="4" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition resize-none" placeholder="Describe detalladamente la mejora propuesta..." required></textarea>
                </div>

                <!-- Beneficios esperados -->
                <div>
                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Beneficios Esperados</label>
                    <textarea id="beneficios" rows="3" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition resize-none" placeholder="¿Qué beneficios traerá esta mejora?" required></textarea>
                </div>

                <!-- Costo estimado y plazo -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Costo Estimado (CLP)</label>
                        <input type="number" id="costo_estimado" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="0" min="0">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Plazo Estimado (días)</label>
                        <input type="number" id="plazo_estimado" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="0" min="0">
                    </div>
                </div>

                <!-- Ubicación específica -->
                <div>
                    <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Ubicación Específica</label>
                    <input type="text" id="ubicacion" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition" placeholder="Ej: Sala de servidores, Piso 3..." required>
                </div>

                <!-- Botón guardar -->
                <button type="submit" id="btnGuardar" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition flex items-center justify-center gap-2">
                    <i class="bi bi-check-circle"></i> Guardar Ficha de Mejora
                </button>
            </form>
        </div>

        <!-- Listado de mejoras -->
        <div class="max-w-5xl mx-auto mt-8 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
            <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                <i class="bi bi-list-task text-green-600"></i> Mejoras Registradas
            </h2>
            <div class="table-container">
                <table class="table-styled" id="tablaMejoras">
                    <thead>
                        <tr class="text-sm text-slate-500 dark:text-slate-400 uppercase">
                            <th>Fecha</th>
                            <th>Empresa</th>
                            <th>Tipo</th>
                            <th>Prioridad</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm" id="bodyTablaMejoras">
                        <tr><td colspan="6" class="text-center py-4">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db, initTheme, checkAuth, formatDate } from './js/firebase-config.js';
        import { collection, getDocs, addDoc, query, where, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Inicializar tema
        initTheme();

        // Verificar autenticación
        checkAuth();

        // Cargar empresas
        async function cargarEmpresas() {
            try {
                const querySnapshot = await getDocs(collection(db, "empresas"));
                const select = document.getElementById('empresa_id');
                select.innerHTML = '<option value="">Seleccionar empresa</option>';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    select.innerHTML += `<option value="${doc.id}">${data.nombre}</option>`;
                });
            } catch (e) {
                console.error("Error:", e);
            }
        }

        // Cargar solicitantes por empresa
        document.getElementById('empresa_id').addEventListener('change', async (e) => {
            const empresaId = e.target.value;
            const selectSol = document.getElementById('solicitante_id');
            if (!empresaId) return;

            selectSol.disabled = false;
            selectSol.innerHTML = '<option value="">Cargando...</option>';

            const q = query(collection(db, "solicitantes"), where("empresa_id", "==", empresaId));
            const querySnapshot = await getDocs(q);

            selectSol.innerHTML = '<option value="">Seleccionar solicitante</option>';
            querySnapshot.forEach((doc) => {
                const s = doc.data();
                selectSol.innerHTML += `<option value="${doc.id}">${s.nombre}</option>`;
            });
        });

        // Guardar ficha de mejora
        document.getElementById('mejorasForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btnGuardar = document.getElementById('btnGuardar');
            btnGuardar.disabled = true;
            btnGuardar.innerHTML = '<i class="bi bi-hourglass-split"></i> Guardando...';

            try {
                const nuevaMejora = {
                    empresa_id: document.getElementById('empresa_id').value,
                    solicitante_id: document.getElementById('solicitante_id').value,
                    tipo_mejora: document.getElementById('tipo_mejora').value,
                    prioridad: document.getElementById('prioridad').value,
                    descripcion: document.getElementById('descripcion').value,
                    beneficios: document.getElementById('beneficios').value,
                    costo_estimado: parseFloat(document.getElementById('costo_estimado').value) || 0,
                    plazo_estimado: parseInt(document.getElementById('plazo_estimado').value) || 0,
                    ubicacion: document.getElementById('ubicacion').value,
                    estado: 'pendiente',
                    fecha_creacion: new Date().toISOString(),
                    created_by: auth.currentUser.uid
                };

                await addDoc(collection(db, "fichas_mejoras"), nuevaMejora);

                alert('✅ Ficha de mejora guardada exitosamente');
                document.getElementById('mejorasForm').reset();
                cargarMejoras();
            } catch (error) {
                console.error("Error al guardar:", error);
                alert('❌ Error al guardar la ficha');
            } finally {
                btnGuardar.disabled = false;
                btnGuardar.innerHTML = '<i class="bi bi-check-circle"></i> Guardar Ficha de Mejora';
            }
        });

        // Cargar mejoras en la tabla
        async function cargarMejoras() {
            try {
                const bodyTabla = document.getElementById('bodyTablaMejoras');
                const q = query(collection(db, "fichas_mejoras"), orderBy("fecha_creacion", "desc"));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    bodyTabla.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-slate-500">No hay mejoras registradas</td></tr>';
                    return;
                }

                // Cargar empresas para mostrar nombres
                const empresasMap = {};
                const empresasSnapshot = await getDocs(collection(db, "empresas"));
                empresasSnapshot.forEach(doc => {
                    empresasMap[doc.id] = doc.data().nombre;
                });

                bodyTabla.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const empresaNombre = empresasMap[data.empresa_id] || 'Desconocida';

                    const badgeClass = {
                        'baja': 'badge-info',
                        'media': 'badge-warning',
                        'alta': 'badge-danger',
                        'critica': 'badge-danger'
                    }[data.prioridad] || 'badge-info';

                    const estadoClass = {
                        'pendiente': 'badge-warning',
                        'en_progreso': 'badge-info',
                        'completado': 'badge-success',
                        'cancelado': 'badge-danger'
                    }[data.estado] || 'badge-info';

                    bodyTabla.innerHTML += `
                        <tr class="border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition">
                            <td class="py-3">${formatDate(data.fecha_creacion)}</td>
                            <td class="font-medium">${empresaNombre}</td>
                            <td class="capitalize">${data.tipo_mejora}</td>
                            <td><span class="badge ${badgeClass}">${data.prioridad}</span></td>
                            <td><span class="badge ${estadoClass}">${data.estado.replace('_', ' ')}</span></td>
                            <td>
                                <div class="flex gap-2">
                                    <button onclick="window.editarMejora('${docSnap.id}')" class="text-blue-600 hover:text-blue-800 dark:text-blue-400" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button onclick="window.eliminarMejora('${docSnap.id}')" class="text-red-600 hover:text-red-800 dark:text-red-400" title="Eliminar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar mejoras:", error);
                document.getElementById('bodyTablaMejoras').innerHTML = '<tr><td colspan="6" class="text-center py-4 text-red-500">Error al cargar datos</td></tr>';
            }
        }

        // Funciones globales para editar/eliminar
        window.editarMejora = async (id) => {
            alert('Función de edición en desarrollo - ID: ' + id);
        };

        window.eliminarMejora = async (id) => {
            if (confirm('¿Estás seguro de eliminar esta ficha de mejora?')) {
                try {
                    await deleteDoc(doc(db, "fichas_mejoras", id));
                    alert('✅ Ficha eliminada');
                    cargarMejoras();
                } catch (error) {
                    console.error("Error al eliminar:", error);
                    alert('❌ Error al eliminar');
                }
            }
        };

        // Cargar datos iniciales
        cargarEmpresas();
        cargarMejoras();
    </script>
</body>
</html>
