<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergencia Reactiva | INELRED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300 font-sans">

    <div id="toastContainer" class="fixed top-5 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <nav class="bg-red-600 text-white px-6 py-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-red-200 hover:text-white transition"><i class="bi bi-arrow-left text-xl"></i></a>
                <span class="text-sm font-bold uppercase tracking-wider"><i class="bi bi-exclamation-triangle-fill mr-2"></i> Atención de Emergencia (Reactivo)</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-mono bg-red-800 px-3 py-1 rounded-full">ID: REA-<span id="display_correlativo">...</span></span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-6 max-w-4xl">
        <form id="reactivoForm" class="space-y-6">
            
            <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Empresa Afectada</label>
                        <select id="empresa_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg outline-none" required></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Sucursal</label>
                        <select id="sucursal_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg outline-none" disabled required></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Solicitado por</label>
                        <select id="solicitante_id" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg outline-none" disabled required></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Área Específica</label>
                        <input type="text" id="area" placeholder="Ej: Tablero Principal, Casino..." class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg outline-none" required>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
                <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2">Diagnóstico y Evidencia</h2>
                
                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Descripción de la falla y solución aplicada</label>
                <textarea id="descripcion" rows="4" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg outline-none mb-6" required></textarea>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <div class="text-sm font-bold text-center mb-2 text-red-500">FOTO ANTES (Falla)</div>
                        <div id="dzAntes" class="border-2 border-dashed border-red-300 rounded-xl p-6 text-center cursor-pointer bg-red-50 dark:bg-red-900/10">
                            <i class="bi bi-camera text-2xl text-red-400"></i>
                            <input type="file" id="fAntes" accept="image/*" class="hidden">
                        </div>
                        <div id="pAntes" class="mt-2 text-center"></div>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-center mb-2 text-emerald-500">FOTO DESPUÉS (Solución)</div>
                        <div id="dzDespues" class="border-2 border-dashed border-emerald-300 rounded-xl p-6 text-center cursor-pointer bg-emerald-50 dark:bg-emerald-900/10">
                            <i class="bi bi-check-circle text-2xl text-emerald-400"></i>
                            <input type="file" id="fDespues" accept="image/*" class="hidden">
                        </div>
                        <div id="pDespues" class="mt-2 text-center"></div>
                    </div>
                </div>
            </div>

            <button type="submit" id="btnGuardar" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-red-700 transition shadow-lg shadow-red-500/30">
                Cerrar Emergencia
            </button>
        </form>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, limit, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyBMcHFfBlG76ua3fVTOdpyXNXqXTooELf8", authDomain: "inelred-e8f50.firebaseapp.com", projectId: "inelred-e8f50", storageBucket: "inelred-e8f50.firebasestorage.app", messagingSenderId: "412934833273", appId: "1:412934833273:web:734337299e2557ed8f40a8" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const storage = getStorage(app);
        
        let correlativoNum = 1;

        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');

        onAuthStateChanged(getAuth(app), async (user) => { 
            if(!user) window.location.href='index.html'; 
            else {
                // Obtener Correlativo
                const q = query(collection(db, "fichas_reactivos"), orderBy("correlativo", "desc"), limit(1));
                const snapC = await getDocs(q);
                if(!snapC.empty) correlativoNum = snapC.docs[0].data().correlativo + 1;
                document.getElementById('display_correlativo').textContent = correlativoNum.toString().padStart(3, '0');

                // Llenar empresas
                const snapE = await getDocs(collection(db, "empresas"));
                const s = document.getElementById('empresa_id'); s.innerHTML = '<option value="">Seleccionar empresa</option>';
                snapE.forEach(d => s.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`);
            }
        });

        document.getElementById('empresa_id').addEventListener('change', async (e) => {
            const id = e.target.value; const selSol = document.getElementById('solicitante_id'); const selSuc = document.getElementById('sucursal_id');
            if(!id){ selSol.disabled=true; selSuc.disabled=true; return; }
            selSol.disabled=false; selSuc.disabled=false;
            const [snapSol, snapSuc] = await Promise.all([ getDocs(query(collection(db, "solicitantes"), where("empresas", "array-contains", id))), getDocs(query(collection(db, "sucursales"), where("empresa_id", "==", id))) ]);
            selSol.innerHTML = '<option value="">Seleccionar</option>'; snapSol.forEach(d => selSol.innerHTML+=`<option value="${d.id}">${d.data().nombre}</option>`);
            selSuc.innerHTML = '<option value="">Seleccionar</option>'; snapSuc.forEach(d => selSuc.innerHTML+=`<option value="${d.id}">${d.data().alias}</option>`);
        });

        const setupFoto = (dzId, fId, pId) => {
            const dz=document.getElementById(dzId), fi=document.getElementById(fId), p=document.getElementById(pId);
            dz.onclick=()=>fi.click(); fi.onchange=()=>{ 
                if(fi.files[0]) { const r=new FileReader(); r.onload=e=>{ p.innerHTML=`<img src="${e.target.result}" class="w-full h-32 object-cover rounded shadow">`; }; r.readAsDataURL(fi.files[0]); }
            };
        };
        setupFoto('dzAntes', 'fAntes', 'pAntes'); setupFoto('dzDespues', 'fDespues', 'pDespues');

        document.getElementById('reactivoForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnGuardar'); btn.disabled=true; btn.innerHTML='Registrando...';
            try {
                let urlAntes = '', urlDesp = '';
                const fA = document.getElementById('fAntes').files[0], fD = document.getElementById('fDespues').files[0];
                const ts = Date.now();
                if(fA) { const r = ref(storage, `reactivos/REA_${correlativoNum}_antes_${ts}`); await uploadBytes(r, fA); urlAntes = await getDownloadURL(r); }
                if(fD) { const r = ref(storage, `reactivos/REA_${correlativoNum}_desp_${ts}`); await uploadBytes(r, fD); urlDesp = await getDownloadURL(r); }

                await addDoc(collection(db, "fichas_reactivos"), {
                    correlativo: correlativoNum, id_str: `REA-${correlativoNum.toString().padStart(3,'0')}`,
                    empresa: document.getElementById('empresa_id').value, suc: document.getElementById('sucursal_id').value, sol: document.getElementById('solicitante_id').value,
                    area: document.getElementById('area').value, desc: document.getElementById('descripcion').value,
                    foto_antes: urlAntes, foto_despues: urlDesp, timestamp: serverTimestamp()
                });
                alert("Emergencia registrada exitosamente"); window.location.href="dashboard.html";
            } catch(er) { alert("Error: "+er.message); btn.disabled=false; btn.innerHTML='Cerrar Emergencia'; }
        });
    </script>
</body>
</html>
