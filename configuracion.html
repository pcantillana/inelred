<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración | INELRED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300 font-sans">

    <!-- Navbar Consistente -->
    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 transition-colors sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition">
                    <i class="bi bi-arrow-left text-xl"></i>
                </a>
                <img src="img/logo.png" alt="Logo" class="h-8 w-auto bg-white rounded p-1">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider hidden md:block">Configuración de Maestros</span>
            </div>
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                <i class="bi bi-moon-fill dark:hidden"></i>
                <i class="bi bi-sun-fill hidden dark:block text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="container mx-auto p-4 md:p-6 max-w-7xl">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                <i class="bi bi-gear-fill text-slate-400"></i> Ajustes del Sistema
            </h1>
        </div>

        <!-- Sistema de Tabs -->
        <div class="flex border-b border-slate-200 dark:border-slate-800 mb-6">
            <button id="tab-empresas" class="px-6 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 focus:outline-none transition-colors" onclick="switchTab('empresas')">
                <i class="bi bi-building mr-2"></i>Empresas
            </button>
            <button id="tab-solicitantes" class="px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300 focus:outline-none transition-colors" onclick="switchTab('solicitantes')">
                <i class="bi bi-people mr-2"></i>Solicitantes
            </button>
        </div>

        <!-- ==================== SECCIÓN EMPRESAS ==================== -->
        <div id="seccion-empresas" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Formulario Empresas -->
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                    <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 flex items-center gap-2">
                        <i class="bi bi-plus-circle text-blue-500"></i> Nueva Empresa
                    </h2>
                    <form id="formEmpresa" class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Nombre de la Empresa</label>
                            <input type="text" id="nombreEmpresa" placeholder="Ej: TechCorp S.A." class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                        </div>
                        <button type="submit" id="btnGuardarEmpresa" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                            <i class="bi bi-save"></i> Guardar Empresa
                        </button>
                    </form>
                </div>
            </div>

            <!-- Tabla Empresas -->
            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 dark:bg-slate-800 text-xs uppercase text-slate-500 dark:text-slate-400">
                                <tr>
                                    <th class="p-4 border-b border-slate-200 dark:border-slate-700">ID</th>
                                    <th class="p-4 border-b border-slate-200 dark:border-slate-700">Nombre de Empresa</th>
                                    <th class="p-4 border-b border-slate-200 dark:border-slate-700 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaEmpresas" class="divide-y divide-slate-100 dark:divide-slate-800 text-sm">
                                <tr><td colspan="3" class="p-4 text-center text-slate-500">Cargando datos...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== SECCIÓN SOLICITANTES ==================== -->
        <div id="seccion-solicitantes" class="grid grid-cols-1 lg:grid-cols-3 gap-6 hidden">
            <!-- Formulario Solicitantes -->
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                    <h2 class="text-lg font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 flex items-center gap-2">
                        <i class="bi bi-person-plus text-emerald-500"></i> Nuevo Solicitante
                    </h2>
                    <form id="formSolicitante" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Nombre</label>
                                <input type="text" id="solNombre" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Apellido</label>
                                <input type="text" id="solApellido" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Correo Electrónico</label>
                            <input type="email" id="solCorreo" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-600 dark:text-slate-400 mb-2">Empresa a la que pertenece</label>
                            <select id="solEmpresaId" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
                                <option value="">Cargando empresas...</option>
                            </select>
                        </div>
                        <button type="submit" id="btnGuardarSolicitante" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition flex items-center justify-center gap-2">
                            <i class="bi bi-save"></i> Guardar Solicitante
                        </button>
                    </form>
                </div>
            </div>

            <!-- Tabla Solicitantes -->
            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 dark:bg-slate-800 text-xs uppercase text-slate-500 dark:text-slate-400">
                                <tr>
                                    <th class="p-4 border-b border-slate-200 dark:border-slate-700">Nombre Completo</th>
                                    <th class="p-4 border-b border-slate-200 dark:border-slate-700">Correo</th>
                                    <th class="p-4 border-b border-slate-200 dark:border-slate-700">Empresa</th>
                                    <th class="p-4 border-b border-slate-200 dark:border-slate-700 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaSolicitantes" class="divide-y divide-slate-100 dark:divide-slate-800 text-sm">
                                <tr><td colspan="4" class="p-4 text-center text-slate-500">Cargando datos...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMcHFfBlG76ua3fVTOdpyXNXqXTooELf8",
            authDomain: "inelred-e8f50.firebaseapp.com",
            projectId: "inelred-e8f50",
            storageBucket: "inelred-e8f50.firebasestorage.app",
            messagingSenderId: "412934833273",
            appId: "1:412934833273:web:734337299e2557ed8f40a8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Mapas globales para relacionar IDs con nombres
        let empresasMap = {};

        // Control de UI (Tema y Tabs)
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        window.switchTab = (tab) => {
            // Estilos de botones
            const btnEmp = document.getElementById('tab-empresas');
            const btnSol = document.getElementById('tab-solicitantes');
            
            if (tab === 'empresas') {
                btnEmp.className = "px-6 py-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 focus:outline-none transition-colors";
                btnSol.className = "px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300 focus:outline-none transition-colors";
                document.getElementById('seccion-empresas').classList.remove('hidden');
                document.getElementById('seccion-solicitantes').classList.add('hidden');
            } else {
                btnSol.className = "px-6 py-3 text-sm font-bold border-b-2 border-emerald-600 text-emerald-600 dark:text-emerald-400 focus:outline-none transition-colors";
                btnEmp.className = "px-6 py-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300 focus:outline-none transition-colors";
                document.getElementById('seccion-solicitantes').classList.remove('hidden');
                document.getElementById('seccion-empresas').classList.add('hidden');
            }
        };

        // Seguridad y Carga Inicial
        onAuthStateChanged(auth, (user) => { 
            if (!user) window.location.href = 'index.html'; 
            else {
                cargarEmpresas();
            }
        });

        // ================= EMPRESAS =================
        async function cargarEmpresas() {
            try {
                const snap = await getDocs(collection(db, "empresas"));
                const lista = document.getElementById('listaEmpresas');
                const selectSol = document.getElementById('solEmpresaId');
                
                lista.innerHTML = '';
                selectSol.innerHTML = '<option value="">Seleccionar empresa...</option>';
                empresasMap = {}; // Resetear mapa
                
                if(snap.empty) {
                    lista.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-slate-500">No hay empresas registradas</td></tr>';
                }

                snap.forEach(documento => {
                    const data = documento.data();
                    empresasMap[documento.id] = data.nombre; // Guardar en el diccionario

                    // Llenar tabla
                    lista.innerHTML += `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                            <td class="p-4 font-mono text-slate-400">${documento.id.slice(-6)}</td>
                            <td class="p-4 font-bold text-slate-700 dark:text-slate-200">${data.nombre}</td>
                            <td class="p-4 text-right">
                                <button onclick="eliminarRegistro('empresas', '${documento.id}')" class="text-red-500 hover:text-red-700 p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition" title="Eliminar">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;

                    // Llenar select del formulario de solicitantes
                    selectSol.innerHTML += `<option value="${documento.id}">${data.nombre}</option>`;
                });

                // Una vez cargadas las empresas, cargar los solicitantes para poder cruzar los nombres
                cargarSolicitantes();
            } catch (error) {
                console.error("Error al cargar empresas:", error);
            }
        }

        document.getElementById('formEmpresa').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('nombreEmpresa');
            const btn = document.getElementById('btnGuardarEmpresa');
            
            if(!input.value.trim()) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Guardando...';

            try {
                await addDoc(collection(db, "empresas"), { nombre: input.value.trim() });
                input.value = '';
                cargarEmpresas();
            } catch (error) {
                alert("Error al guardar: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-save"></i> Guardar Empresa';
            }
        });

        // ================= SOLICITANTES =================
        async function cargarSolicitantes() {
            try {
                const snap = await getDocs(collection(db, "solicitantes"));
                const lista = document.getElementById('listaSolicitantes');
                lista.innerHTML = '';

                if(snap.empty) {
                    lista.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500">No hay solicitantes registrados</td></tr>';
                    return;
                }

                snap.forEach(documento => {
                    const data = documento.data();
                    const nombreEmpresa = empresasMap[data.empresa_id] || '<span class="text-red-500">Empresa no encontrada</span>';

                    lista.innerHTML += `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                            <td class="p-4 font-bold text-slate-700 dark:text-slate-200">${data.nombre} ${data.apellido}</td>
                            <td class="p-4 text-slate-600 dark:text-slate-400">${data.correo}</td>
                            <td class="p-4"><span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-blue-900 dark:text-blue-300">${nombreEmpresa}</span></td>
                            <td class="p-4 text-right">
                                <button onclick="eliminarRegistro('solicitantes', '${documento.id}')" class="text-red-500 hover:text-red-700 p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition" title="Eliminar">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar solicitantes:", error);
            }
        }

        document.getElementById('formSolicitante').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnGuardarSolicitante');
            
            const data = {
                nombre: document.getElementById('solNombre').value.trim(),
                apellido: document.getElementById('solApellido').value.trim(),
                correo: document.getElementById('solCorreo').value.trim(),
                empresa_id: document.getElementById('solEmpresaId').value
            };

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Guardando...';

            try {
                await addDoc(collection(db, "solicitantes"), data);
                document.getElementById('formSolicitante').reset();
                cargarSolicitantes();
            } catch (error) {
                alert("Error al guardar: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-save"></i> Guardar Solicitante';
            }
        });

        // ================= FUNCIÓN GLOBAL ELIMINAR =================
        window.eliminarRegistro = async (coleccion, id) => {
            if(confirm(`¿Estás seguro de que deseas eliminar este registro de ${coleccion}?`)) {
                try {
                    await deleteDoc(doc(db, coleccion, id));
                    if(coleccion === 'empresas') cargarEmpresas();
                    if(coleccion === 'solicitantes') cargarSolicitantes();
                } catch(error) {
                    alert("Error al eliminar: " + error.message);
                }
            }
        };

    </script>
</body>
</html>
