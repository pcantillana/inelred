<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración | INELRED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-300 font-sans">

    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 transition-colors">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition">
                    <i class="bi bi-arrow-left text-xl"></i>
                </a>
                <img src="img/logo.png" alt="Logo" class="h-8 w-auto bg-white rounded p-1">
                <span class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider hidden md:block">Configuración de Maestros</span>
            </div>
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                <i class="bi bi-moon-fill dark:hidden"></i>
                <i class="bi bi-sun-fill hidden dark:block text-yellow-400"></i>
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-6 mt-4">
        <h1 class="text-2xl font-bold mb-6 text-slate-900 dark:text-white">Administración de Empresas</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Columna Izquierda: Formulario -->
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="bi bi-plus-circle text-blue-600"></i> Nueva Empresa
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1">Nombre</label>
                            <input type="text" id="nombreEmpresa" placeholder="Nombre de la empresa" class="w-full p-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <button id="btnGuardarEmpresa" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 transition font-medium flex items-center justify-center gap-2">
                            <i class="bi bi-save"></i> Guardar Registro
                        </button>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Tabla de datos -->
            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">
                                <tr>
                                    <th class="p-4">ID</th>
                                    <th class="p-4">Nombre de Empresa</th>
                                    <th class="p-4 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaEmpresas" class="divide-y divide-slate-100 dark:divide-slate-800">
                                <!-- Filas cargadas dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMcHFfBlG76ua3fVTOdpyXNXqXTooELf8",
            authDomain: "inelred-e8f50.firebaseapp.com",
            projectId: "inelred-e8f50",
            storageBucket: "inelred-e8f50.firebasestorage.app",
            messagingSenderId: "412934833273",
            appId: "1:412934833273:web:734337299e2557ed8f40a8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Seguridad
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = 'index.html'; });

        // Lógica de UI
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        // CRUD: Leer
        async function cargarEmpresas() {
            const querySnapshot = await getDocs(collection(db, "empresas"));
            const lista = document.getElementById('listaEmpresas');
            lista.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                lista.innerHTML += `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition">
                        <td class="p-4 text-xs font-mono text-slate-400">${doc.id.slice(-6)}</td>
                        <td class="p-4 font-medium">${data.nombre}</td>
                        <td class="p-4 text-right">
                            <button onclick="window.eliminarEmpresa('${doc.id}')" class="text-red-500 hover:text-red-700 dark:hover:text-red-400 p-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // CRUD: Crear
        document.getElementById('btnGuardarEmpresa').addEventListener('click', async () => {
            const input = document.getElementById('nombreEmpresa');
            if(!input.value.trim()) return;
            await addDoc(collection(db, "empresas"), { nombre: input.value });
            input.value = '';
            cargarEmpresas();
        });

        // CRUD: Eliminar
        window.eliminarEmpresa = async (id) => {
            if(confirm('¿Eliminar esta empresa?')) {
                await deleteDoc(doc(db, "empresas", id));
                cargarEmpresas();
            }
        };

        cargarEmpresas();
    </script>
</body>
</html>
